<!DOCTYPE html>
<html>
<head><title>JAH-Qwen Chat</title></head>
<body>
<h2>JAH-Qwen Bridge Chat</h2>
<input id="msg" type="text" size="60" placeholder="Escribe tu mensaje...">
<button onclick="send()">Enviar</button>
<pre id="resp"></pre>
<script>
function send() {
    const msg = document.getElementById('msg').value;
    fetch('/agent.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg})
    })
    .then(r => r.json())
    .then(d => {
        document.getElementById('resp').textContent = 
            'Contexto usado: ' + d.context_used + '\n\n' + d.response;
    });
}
</script>
</body>
</html>
